{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">{{ title }}</div>
            <div class="card-body p-4">
                <form method="post">{% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Username *</label>{{ form.username }}</div>
                        <div class="col-md-6"><label class="form-label">Nama Lengkap *</label>{{ form.first_name }}</div>
                        <div class="col-md-6"><label class="form-label">Email</label>{{ form.email }}</div>
                        <div class="col-md-6"><label class="form-label">No. HP</label>{{ form.phone }}</div>
                        <div class="col-md-6"><label class="form-label">Role *</label>{{ form.role }}</div>
                        <div class="col-md-6"><label class="form-label">Password *</label>{{ form.password }}</div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-gold">Simpan</button>
                        <a href="{% url 'user_list' %}" class="btn btn-outline-gold">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
