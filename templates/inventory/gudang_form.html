{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">{{ title }}</div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Nama Gudang *</label>
                            <input type="text" name="nama" class="form-control"
                                value="{{ gudang.nama|default:'' }}"
                                placeholder="Contoh: Gudang Andir" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Alamat</label>
                            <textarea name="alamat" class="form-control" rows="2"
                                placeholder="Alamat lengkap gudang">{{ gudang.alamat|default:'' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Keterangan</label>
                            <textarea name="keterangan" class="form-control" rows="2"
                                placeholder="Catatan tambahan">{{ gudang.keterangan|default:'' }}</textarea>
                        </div>
                        {% if gudang %}
                        <div class="col-12">
                            <div class="form-check">
                                <input type="checkbox" name="aktif"
                                    class="form-check-input" id="aktif"
                                    {% if gudang.aktif %}checked{% endif %}>
                                <label class="form-check-label" for="aktif">
                                    Gudang aktif
                                </label>
                            </div>
                        </div>
                        {% endif %}
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-gold">Simpan</button>
                        <a href="{% url 'gudang_list' %}"
                            class="btn btn-outline-gold">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
